version: '3.8'

services:
  # 1. Contêiner da Aplicação PHP (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: senhas_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - senhas_network
    depends_on:
      - db

  # 2. Servidor Nginx (Interno do docker-compose para servir PHP-FPM em HTTP)
  # Expõe a porta 8000 para que o Nginx/Nginx Proxy Manager da sua VPS a acesse!
  web:
    image: nginx:alpine
    container_name: senhas_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - senhas_network
    depends_on:
      - app

  # 3. Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: senhas_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_senhas
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_secret
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - senhas_network

networks:
  senhas_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
